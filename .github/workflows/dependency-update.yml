name: Dependency Update

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    name: Update Go Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Update dependencies
        run: |
          go get -u ./...
          go mod tidy

      - name: Run tests
        id: test
        run: go test ./...
        continue-on-error: true

      - name: Create Pull Request
        if: steps.test.outcome == 'success'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update go dependencies"
          title: "chore: update go dependencies"
          body: |
            Automated Go dependency update

            - Updated `go.mod` and `go.sum` with latest compatible versions
            - All tests passing ✅

            Please review and merge if everything looks good.
          branch: chore/update-dependencies
          delete-branch: true
          labels: |
            dependencies
            automated

      - name: Open issue on failure
        if: steps.test.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Dependency update failed tests',
              body: 'The automated Go dependency update failed the test suite. Manual intervention required.',
              labels: ['dependencies', 'bug']
            })
