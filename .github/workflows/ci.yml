name: CI Pipeline

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]
    workflow_dispatch:

jobs:
    lint:
        name: Linting
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Install uv
              uses: astral-sh/setup-uv@v5
              with:
                  version: "latest"

            - name: Install dependencies
              run: |
                  uv sync --extra dev

            - name: Run ruff linting
              run: |
                  uv run ruff check src/ tests/

            - name: Run ruff formatting check
              run: |
                  uv run ruff format --check src/ tests/

            - name: Run mypy type checking
              run: |
                  uv run mypy src/
              continue-on-error: true

    test:
        name: Tests
        runs-on: ubuntu-latest
        strategy:
            matrix:
                python-version: ["3.11", "3.12"]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Install uv
              uses: astral-sh/setup-uv@v5
              with:
                  version: "latest"

            - name: Install dependencies
              run: |
                  uv sync --extra test

            - name: Run unit tests
              run: |
                  uv run pytest tests/ -v --cov=src/lqt_lynter --cov-report=xml --cov-report=term

            - name: Upload coverage reports
              uses: codecov/codecov-action@v4
              with:
                  file: ./coverage.xml
                  token: ${{ secrets.CODECOV_TOKEN }}
                  fail_ci_if_error: false

            - name: Run BDD tests
              run: |
                  uv run behave tests/features/ -v

    build:
        name: Build
        runs-on: ubuntu-latest
        needs: [lint, test]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Install uv
              uses: astral-sh/setup-uv@v5
              with:
                  version: "latest"

            - name: Install dependencies
              run: |
                  uv sync

            - name: Build distribution
              run: |
                  uv build

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: dist-${{ github.sha }}
                  path: dist/
                  retention-days: 7

    docs:
        name: Documentation
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Install uv
              uses: astral-sh/setup-uv@v5
              with:
                  version: "latest"

            - name: Install dependencies
              run: |
                  uv sync --extra docs

            - name: Build documentation
              run: |
                  cd docs && uv run sphinx-build -b html . _build/html

            - name: Upload documentation
              uses: actions/upload-artifact@v4
              with:
                  name: docs-${{ github.sha }}
                  path: docs/_build/html/
                  retention-days: 7
